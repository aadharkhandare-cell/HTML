<!DOCTYPE html>

<html>
<head>
  <title>border example</title>
  <style>
  h1{
    border-style: solid;
    border-width: 30px;

    text-align: center;
  }
  h2{
    border: 10px, double, green;
  }
  img{
    border: solid, brown;

    text-decoration: none;
    text-shadow: yellogreen;

    font: 100;

</head>
<body>

  </h1>
  <h2>CSS Border Example</h2>
  <img src="Image2.jpg" width="300"><br>
