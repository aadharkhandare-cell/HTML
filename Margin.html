<!DOCTYPE html>

<html>
<head>
  <title>Margin example</title>
  <style>
  .box1{
    border-style: solid;
    border-color: brown;
    padding: 20px;
    margin : 10px;
  }
  .box2{
    border-style: solid;
    border-color: brown;
    padding: 20px;
    margin-top: 10px;
    margin-left: 10px;
  }
  .box3{
    border-style: solid;
    border-color: brown;
    padding: 20px;
    margin: auto;
  }
  .box4{
    border-style: solid;
    border-color: brown;
    padding: 20px;
    margin: 10px,20px;
  }
  
  </style>
</head>
<body>
  <div class="box1">
    In box 1
  </div>
  <div class="box2">
    In box 2
  </div>
  <div class="box3">
    In box 3
  </div>
  <div class="box4">
    In box 4
  </div>
</body>
</html>
