<!DOCTYPE html>

<html>
<head>
   <title>Inline and Inlineblock use</title>
  <style>
  .inline{
    display: inline;
    width:150px;
    height: 90px;
    padding: 10px;
    border: 2px,solid, blue;
    margin: 20px;
  }
  .inlineblock{
    display: inline-block;
    width: 120px;
    height: 80;
    border: 2px, solid, green;
    margin: 10px;
  }
  .hide{
    display: none;
  }
  </style>
</head>
<body>
  <h1>Block Example</h1>
  <div class="inline">
    Html
  </div>
  <div class="inline">
    CSS
  </div>
  <br>
  <br>
  <hr>
  <h2> Inlineblock Example</h2>
  <div class="inlineblock">
    Java
  </div>
  <div class="inlineblock">
    Python
  </div>
  <div class="inlineblock">
    PHP
  </div>
  
  
  <h2>Display None</h2>
  <p class="hide">This paragraph is hidden </p>
  <p>This paragraph is visible</p>
</body>
</html>
